name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy-3.11"]'
      dependency-manager: 'uv'
      pytest_opts: '-n auto --dist loadgroup'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
  macostests:
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
    needs: [tests]
    with:
      python-versions: '["3.12", "3.13", "3.14", "3.15", "pypy-3.11"]'
      dependency-manager: 'uv'
      pytest_opts: '-n auto --dist loadgroup --basetemp=$RUNNER_TEMP/pt'
      os: macos-14 # macos-latest is on macos-15 which misbehaves'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
  oldest:
    needs: [tests]
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy-3.11"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up UV on python ${{ matrix.python-version }}
        uses: fizyk/actions-reuse/.github/actions/uv-setup@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
        with:
          python-version: ${{ matrix.python-version }}
          cache: false
      - name: Install oldest supported versions
        uses: fizyk/actions-reuse/.github/actions/uv-run@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
        with:
          command: pip install -r oldest-requirements.rq
      - name: Run tests
        uses: fizyk/actions-reuse/.github/actions/uv-run@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
        with:
          command: pytest -v --cov --cov-report=xml -n auto --dist loadgroup
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          env_vars: OS,PYTHON
          fail_ci_if_error: false
