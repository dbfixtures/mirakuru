name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to be added'
        required: true
        type: string

jobs:
  release:
    uses: fizyk/actions-reuse/.github/workflows/shared-release.yml@f35c0eab43b88cb5f67a8519eb6dea27146f2145 # v5.2.4
    with:
      version: ${{ inputs.version }}
    secrets:
      app_id: ${{ secrets.RELEASE_APP_ID }}
      private_key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
